<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultado do Diagnóstico</title>

<style>

:root{
--azul-escuro:#1f4e8c;
--azul-medio:#2c6ecb;
--azul-claro:#4fa3f7;
--azul-marinho:#0B2A4A;
--branco:#ffffff;
--cinza:#f4f6f9;
--sombra:0 20px 45px rgba(0,0,0,0.18);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:
linear-gradient(rgba(11,42,74,0.85), rgba(11,42,74,0.85)),
url("https://images.unsplash.com/photo-1552664730-d307ca884978");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:40px 20px;

}

.container{

width:100%;
max-width:900px;

background:rgba(255,255,255,0.96);

padding:45px;

border-radius:20px;

box-shadow:var(--sombra);

text-align:center;

}

h1{

font-size:38px;
color:var(--azul-escuro);
margin-bottom:10px;

}

.subtitle{

font-size:18px;
margin-bottom:35px;
color:#425b76;

}

.result-box{

background:var(--azul-claro);

padding:30px;

border-radius:14px;

margin-bottom:30px;

}

.result-box h2{

color:var(--azul-marinho);
font-size:26px;

}

.result-box p{

margin-top:10px;
font-size:18px;
font-weight:700;
color:var(--azul-marinho);

}

.analysis{

background:#f4f6f9;

padding:25px;

border-radius:12px;

margin-bottom:30px;

text-align:left;

}

.analysis h3{

color:var(--azul-escuro);
margin-bottom:10px;

}

.analysis ul{

padding-left:20px;

}

.analysis li{

margin-bottom:8px;
font-weight:600;

}

.cta{

margin-top:20px;

}

.btn{

background:var(--azul-medio);
color:white;

border:none;

padding:18px 35px;

font-size:20px;

font-weight:900;

border-radius:10px;

cursor:pointer;

transition:0.3s;

}

.btn:hover{

background:var(--azul-escuro);
transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="container">

<h1>Resultado do seu diagnóstico</h1>

<p class="subtitle">
Veja o nível atual do atendimento da sua empresa.
</p>

<div class="result-box">

<h2 id="nivel">Calculando resultado...</h2>

<p id="pontuacao"></p>

</div>

<div class="analysis">

<h3>O que identificamos</h3>

<ul>

<li>Falta de padrão claro no atendimento</li>
<li>Processos inconsistentes</li>
<li>Comunicação desalinhada entre equipe e cliente</li>
<li>Ausência de métricas claras</li>

</ul>

</div>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="aa15da2f-79b5-4969-bfbd-3b79ab7fe88b">

<input type="hidden" name="subject" value="Resultado Diagnóstico TRPC">

<input type="hidden" name="redirect" value="https://trpcconsultoria.com.br/agradecimento.html">

<input type="hidden" name="Nome" id="nomeLead">
<input type="hidden" name="Empresa" id="empresaLead">
<input type="hidden" name="Pontuacao" id="pontuacaoLead">
<input type="hidden" name="Nivel" id="nivelLead">

<div class="cta">

<button class="btn" type="submit">
Solicitar consultoria
</button>

</div>

</form>

</div>

<script>

/* Recupera dados do lead */

let lead = JSON.parse(localStorage.getItem("trpc_lead"));

if(lead){

document.getElementById("nomeLead").value = lead.nome || "";
document.getElementById("empresaLead").value = lead.empresa || "";

}

/* Simulação de pontuação */

let pontuacao = Math.floor(Math.random() * 40) + 60;

let nivel = "";

if(pontuacao >= 85){

nivel = "Atendimento estruturado";

}else if(pontuacao >= 70){

nivel = "Atendimento em desenvolvimento";

}else{

nivel = "Atendimento em risco";

}

document.getElementById("pontuacao").innerText = "Pontuação: " + pontuacao;

document.getElementById("nivel").innerText = nivel;

document.getElementById("pontuacaoLead").value = pontuacao;
document.getElementById("nivelLead").value = nivel;

</script>

</body>
</html>
